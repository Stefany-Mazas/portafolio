<!DOCTYPE html>
<html lang="es" data-scroll-container>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende Jugando - Temas Educativos</title>
    <!-- Se eliminaron espacios innecesarios en la URL -->
    <link rel="stylesheet" href="css/temas.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Hero -->
    <section class="hero" data-scroll-section>
        <div class="hero-content" data-scroll data-scroll-speed="0.5">
            <h1 data-scroll data-scroll-delay="0.1" data-scroll-speed="1">Aprende Náhuatl ahora</h1>
            <p data-scroll data-scroll-delay="0.2" data-scroll-speed="0.8">Descubre temas educativos divertidos</p>
        </div>
        <div class="hero-image" style="background-image: url('img/2.jpeg')" data-scroll data-scroll-speed="-1"></div>
    </section>

    <!-- Contenedor principal -->
    <main class="temas-container" data-scroll-section>
        <h2 class="section-title" data-scroll data-scroll-offset="100">Elige un tema</h2>
        <div class="temas-grid">
            <a href="#" class="tema-card" style="--color: 39, 174, 96;" data-scroll>
                <div class="tema-circle">
                    <img src="img/mono.gif" alt="Saludos">
                </div>
                <h3 class="tema-title">Saludos</h3>
            </a>
            <a href="nahuatl.html" class="tema-card" style="--color: 231, 76, 60;" data-scroll>
                <div class="tema-circle">
                    <img src="img/mono.gif" alt="Números">
                </div>
                <h3 class="tema-title">Traductor</h3>
            </a>
            <a href="index.html" class="tema-card" style="--color: 41, 128, 185;" data-scroll>
                <div class="tema-circle">
                    <img src="img/monito.gif" alt="Colores">
                </div>
                <h3 class="tema-title">test</h3>
            </a>
        </div>
    </main>

    <!-- Nubes -->
    <section data-scroll-section class="cloud-section">
        <div class="c-cloud-wrapper">
            <div class="c-cloud" data-scroll data-scroll-direction="vertical" data-scroll-speed="3">
                <img src="img/jaguar.png" alt="Nube" class="cloud-img">
            </div>
        </div>
    </section>
    <section data-scroll-section class="cloud-section1">
        <div class="c-cloud-wrapper">
            <div class="c-cloud1" data-scroll data-scroll-direction="horizontal" data-scroll-speed="3">
                <img src="img/quetzalcoatl.png" alt="Nube" class="cloud-img">
            </div>
        </div>
    </section>

    <!-- Footer con botones -->
    <footer class="site-footer" data-scroll-section>
        <div class="footer-content">
            <p>© 2025 Aprende Jugando - Todos los derechos reservados</p>
            <div class="footer-buttons">
                <button id="supportBtn" class="footer-btn" title="Soporte">❓</button>
                <button id="logoutBtn" class="logout-button">Cerrar sesión</button>
            </div>
        </div>

        <!-- Burbuja de soporte -->
        <div id="supportBubble" class="support-bubble">
            <div class="bubble-content">
                <p><strong>¿Tienes dudas o problemas?</strong></p>
                <p>Contacta al siguiente correo:</p>
                <p><a href="mailto:soporte@ketza-ia.edu.mx">soporte@ketza-ia.edu.mx</a></p>
                <button id="closeBubble">&times;</button>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <!-- Se eliminaron espacios innecesarios en las URLs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.js"></script>

    <!-- Script de autenticación, botones y scroll (todo dentro de una etiqueta script) -->
    <script>
        // Protección: si no hay token o email, redirigir a inicio.html
        //if (!localStorage.getItem('authToken') || !localStorage.getItem('authEmail')) {
        console.log("Valor de authToken en temas.html al cargar:", localStorage.getItem('authToken')); // Añadir esta línea

        if (!localStorage.getItem('authToken')) { // Asegúrate de que la clave sea correcta
            window.location.href = 'welcome.html';
        }

        // Cerrar sesión (fragmento actualizado)
        document.getElementById('logoutBtn')?.addEventListener('click', function () {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('authEmail'); // Limpiar email también
                window.location.href = 'welcome.html';
            }
        });

        // Soporte
        const supportBtn = document.getElementById('supportBtn');
        const supportBubble = document.getElementById('supportBubble');
        const closeBubble = document.getElementById('closeBubble');

        if (supportBtn && supportBubble) {
            supportBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                supportBubble.style.display = supportBubble.style.display === 'block' ? 'none' : 'block';
            });

            closeBubble?.addEventListener('click', function (e) {
                e.stopPropagation();
                supportBubble.style.display = 'none';
            });

            document.addEventListener('click', function (e) {
                if (!supportBubble.contains(e.target) && e.target !== supportBtn) {
                    supportBubble.style.display = 'none';
                }
            });
        }

        // === Inicializar scroll y animaciones (tu código original) ===
        document.addEventListener('DOMContentLoaded', function () {
            const scroll = new LocomotiveScroll({
                el: document.querySelector('[data-scroll-container]'),
                smooth: true,
                smartphone: { smooth: true, breakpoint: 768 },
                tablet: { smooth: true, breakpoint: 1024 }
            });

            gsap.registerPlugin(ScrollTrigger);
            ScrollTrigger.scrollerProxy("[data-scroll-container]", {
                scrollTop(value) {
                    return arguments.length ? scroll.scrollTo(value, 0, 0) : scroll.scroll.instance.scroll.y;
                },
                getBoundingClientRect() {
                    return { top: 0, left: 0, width: window.innerWidth, height: window.innerHeight };
                },
                pinType: document.querySelector("[data-scroll-container]").style.transform ? "transform" : "fixed"
            });

            scroll.on("scroll", ScrollTrigger.update);
            ScrollTrigger.addEventListener("refresh", () => scroll.update());
            ScrollTrigger.refresh();
        });
    </script>
</body>
</html>
