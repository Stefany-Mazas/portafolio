<!-- wwwroot/inicio.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Ketza-IA - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            background-color: #f0f0f0;
        }

        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .auth-box {
            background: #ffffff;
            padding: 2rem;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

            .auth-box h2 {
                text-align: center;
                margin-bottom: 1.5rem;
                color: #2ecc71;
                font-weight: 700;
            }

            .auth-box input {
                width: 100%;
                padding: 0.8rem;
                margin-bottom: 1rem;
                font-size: 1rem;
                border: 1px solid #ddd;
                border-radius: 8px;
            }

            .auth-box button {
                width: 100%;
                padding: 0.8rem;
                background-color: #2ecc71;
                color: white;
                font-size: 1rem;
                font-weight: bold;
                border: none;
                border-radius: 8px;
                cursor: pointer;
            }

                .auth-box button:hover {
                    background-color: #27ae60;
                }

        .toggle-link {
            margin-top: 1rem;
            text-align: center;
            color: #3498db;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: underline;
        }

        .small {
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .auth-screen {
            display: none;
        }

            .auth-screen.active {
                display: block;
                animation: fadeIn 0.4s ease-out;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="auth-modal" id="authModal">
        <div class="auth-box">
            <div id="loginScreen" class="auth-screen active">
                <h2>Iniciar Sesión</h2>
                <form id="loginForm">
                    <input type="email" name="email" placeholder="Correo electrónico" required />
                    <input type="password" name="password" placeholder="Contraseña" required />
                    <button type="submit">Entrar</button>
                </form>
                <p class="toggle-link" onclick="showRegister()">¿No tienes cuenta? Regístrate</p>
                <p class="toggle-link small" onclick="showRecovery()">¿Olvidaste tu contraseña?</p>
            </div>

            <div id="registerScreen" class="auth-screen">
                <h2>Crear Cuenta</h2>
                <form id="registerForm">
                    <input type="email" name="email" placeholder="Correo electrónico" required />
                    <input type="password" name="password" placeholder="Contraseña" required />
                    <button type="submit">Registrar</button>
                </form>
                <p class="toggle-link" onclick="showLogin()">¿Ya tienes cuenta? Inicia sesión</p>
            </div>

            <div id="recoveryScreen" class="auth-screen">
                <h2>Recuperar Contraseña</h2>
                <form id="recoveryForm">
                    <input type="email" name="email" placeholder="Tu correo electrónico" required />
                    <button type="submit">Enviar instrucciones</button>
                </form>
                <p class="toggle-link" onclick="showLogin()">Volver al inicio de sesión</p>
            </div>
        </div>
    </div>

    <script>
        function showLogin() { setScreen('loginScreen'); }
        function showRegister() { setScreen('registerScreen'); }
        function showRecovery() { setScreen('recoveryScreen'); }

        function setScreen(screenId) {
            document.querySelectorAll('.auth-screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function getFormValue(form, name) {
            const input = form.querySelector(`[name="${name}"]`);
            return input ? input.value.trim() : '';
        }

        // Login
        document.getElementById("loginForm")?.addEventListener("submit", async function (e) {
            e.preventDefault();
            const email = getFormValue(this, 'email');
            const password = getFormValue(this, 'password');
            if (!email || !password) return alert("Completa todos los campos.");

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    // Guardamos el token devuelto por el servidor
                    localStorage.setItem("authToken", data.Token);
                    console.log("Token guardado en inicio.html:", localStorage.getItem("authToken")); // Añadir esta línea
                    alert("¡Bienvenido/a!");
                    window.location.href = "temas.html";
                } else {
                    alert("Error: " + (data.Message || "Credenciales incorrectas"));
                }
            } catch {
                alert("No conectado con el servidor.");
            }
        });

        // Registro
        document.getElementById("registerForm")?.addEventListener("submit", async function (e) {
            e.preventDefault();
            const email = getFormValue(this, 'email');
            const password = getFormValue(this, 'password');
            if (!email || !password) return alert("Completa todos los campos.");
            if (password.length < 6) return alert("La contraseña debe tener al menos 6 caracteres.");

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    alert("¡Cuenta creada! Ahora inicia sesión.");
                    showLogin();
                } else {
                    alert("Error: " + (data.Message || "No se pudo registrar"));
                }
            } catch {
                alert("No conectado con el servidor.");
            }
        });

        // Recuperación (Llamando al servidor)
        document.getElementById("recoveryForm")?.addEventListener("submit", async function (e) {
            e.preventDefault();
            const email = getFormValue(this, 'email');
            if (!email) return alert("Ingresa tu correo.");

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (res.ok) {
                    alert("Si el correo está registrado, recibirás instrucciones.");
                    showLogin(); // Volver al login después de solicitar
                } else {
                    const data = await res.json();
                    alert("Error: " + (data.Message || "No se pudo procesar la solicitud."));
                }
            } catch (error) {
                alert("No conectado con el servidor.");
                console.error(error);
            }
        });

        // Protección de temas.html
        window.addEventListener("load", () => {
            const path = window.location.pathname.split("/").pop();
            if (path === "temas.html" && !localStorage.getItem("authToken")) {
                window.location.href = "inicio.html";
            }
        });
    </script>
</body>
</html>
