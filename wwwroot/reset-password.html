<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restablecer Contraseña - Ketza-IA</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 2rem; }
    .form-box { background: white; padding: 2rem; border-radius: 10px; width: 100%; max-width: 400px; }
    input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 0.75rem; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #27ae60; }
    .message { margin-top: 1rem; padding: 0.5rem; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Restablecer Contraseña</h2>
    <form id="resetForm">
      <input type="password" id="newPassword" placeholder="Nueva contraseña" required minlength="6">
      <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required>
      <button type="submit">Actualizar Contraseña</button>
    </form>
    <div id="message" style="display:none;"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('message').innerHTML = '<div class="error">Token no válido.</div>';
      document.getElementById('message').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        showMessage('Las contraseñas no coinciden.', 'error');
        return;
      }

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Contraseña actualizada. Redirigiendo...', 'success');
          setTimeout(() => window.location.href = 'inicio.html', 2000);
        } else {
          showMessage(data.Message || 'Error al restablecer.', 'error');
        }
      } catch (err) {
        showMessage('No conectado con el servidor.', 'error');
        console.error(err);
      }
    });

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.className = type;
      msg.innerHTML = text;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
