<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duolingo Náhuatl</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .hearts {
            font-size: 24px;
            color: red;
            margin-bottom: 10px;
        }

        .options button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            background-color: #e0e0e0;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

            .options button:hover {
                background-color: #d0d0d0;
            }

        .options .selected {
            background-color: #2ecc71;
            color: white;
        }

        .submit-button {
            margin-top: 20px;
            padding: 12px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

            .submit-button:disabled {
                background-color: #ccc;
                cursor: not-allowed;
            }

        .result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 20px;
        }

        .final-screen {
            text-align: left;
            margin-top: 20px;
            font-size: 18px;
        }

        .final-score {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }

        .continue-button {
            margin-top: 20px;
            padding: 12px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h2>📚 Duolingo Náhuatl</h2>
        <div class="hearts" id="hearts">❤️ ❤️ ❤️</div>
        <div class="title" id="title">Cargando pregunta...</div>
        <div class="options" id="options"></div>
        <button id="submit" class="submit-button" disabled>Enviar respuesta</button>
        <div id="result" class="result"></div>
    </div>

    <div id="finalScreen" style="display:none; text-align: center;">
        <div class="final-score" id="finalScore"></div>
        <div class="final-screen" id="progressDetails"></div>
        <button class="continue-button" onclick="goToTemas()">Continuar</button>
    </div>

    <script>
        let vidas = 3;
        let idsAleatorios = [];
        let indiceActual = 0;
        let preguntasMostradas = [];

        function updateHearts() {
            document.getElementById("hearts").textContent = "❤️ ".repeat(vidas);
        }

        async function cargarIds() {
            try {
                const res = await fetch('/api/palabra/ids-aleatorios?cantidad=5');
                if (!res.ok) throw new Error('Error al cargar palabras');
                idsAleatorios = await res.json();
                if (idsAleatorios.length === 0) {
                    document.getElementById("title").textContent = "⚠️ No hay palabras registradas.";
                    return;
                }
                mostrarSiguientePregunta();
            } catch (error) {
                console.error(error);
                document.getElementById("title").textContent = "⚠️ Error al conectar con el servidor.";
            }
        }

        async function mostrarSiguientePregunta() {
            if (indiceActual >= idsAleatorios.length || vidas <= 0) {
                mostrarPantallaFinal();
                return;
            }

            const id = idsAleatorios[indiceActual];
            try {
                const res = await fetch(`/api/palabra/pregunta/${id}`);
                if (!res.ok) throw new Error('Palabra no encontrada');
                const data = await res.json();

                // ✅ Usa PascalCase en los valores
                preguntasMostradas.push({
                    Espanol: data.Espanol,    // ← cambiado
                    Nahuatl: data.Correcta,   // ← cambiado
                    Acertada: false
                });

                // ✅ Usa PascalCase aquí también
                document.getElementById("title").textContent = `¿Cuál es la traducción de "${data.Espanol}"?`;
                const optionsDiv = document.getElementById("options");
                optionsDiv.innerHTML = "";
                document.getElementById("result").textContent = "";
                document.getElementById("submit").disabled = true;

                // ✅ Usa PascalCase en el bucle
                data.Opciones.forEach(opcion => { // ← cambiado
                    const btn = document.createElement("button");
                    btn.textContent = opcion;
                    btn.onclick = () => {
                        document.querySelectorAll(".options button").forEach(b => b.classList.remove("selected"));
                        btn.classList.add("selected");
                        document.getElementById("submit").disabled = false;
                        document.getElementById("submit").onclick = () => {
                            document.getElementById("submit").disabled = true;
                            // ✅ Usa PascalCase en la comparación
                            if (btn.textContent === data.Correcta) { // ← cambiado
                                document.getElementById("result").textContent = "✅ ¡Correcto!";
                                document.getElementById("result").style.color = "green";

                                const pregunta = preguntasMostradas[preguntasMostradas.length - 1];
                                if (pregunta) pregunta.acertada = true;
                            } else {
                                vidas--;
                                updateHearts();
                                // ✅ Usa PascalCase aquí también
                                document.getElementById("result").textContent = `❌ Incorrecto. Era "${data.Correcta}"`;
                                document.getElementById("result").style.color = "red";
                            }
                            indiceActual++;
                            setTimeout(mostrarSiguientePregunta, 1500);
                        };
                    };
                    optionsDiv.appendChild(btn);
                });
            } catch (error) {
                console.error(error);
                document.getElementById("title").textContent = "⚠️ Error al cargar la pregunta.";
            }
        }

        function mostrarPantallaFinal() {
            const total = idsAleatorios.length;
            const correctas = total - (3 - vidas);
            const score = Math.max(0, Math.round((correctas / total) * 100));

            const email = localStorage.getItem('authToken');

            const palabrasCorrectas = preguntasMostradas
                .filter(p => p.Acertada)
                .map(p => p.Espanol);

            const palabrasIncorrectas = preguntasMostradas
                .filter(p => !p.Acertada)
                .map(p => p.Espanol);

            fetch('/api/progreso/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Email: email,
                    Puntaje: score,
                    Correctas: correctas,
                    Incorrectas: total - correctas,
                    PalabrasCorrectas: palabrasCorrectas,
                    PalabrasIncorrectas: palabrasIncorrectas
                })
            }).then(res => res.json())
                .then(data => console.log("Progreso guardado:", data))
                .catch(err => console.error("Error guardando progreso:", err));

            document.getElementById("finalScore").textContent = `🏆 Puntaje: ${score}% (${correctas}/${total})`;
            document.getElementById("progressDetails").innerHTML = `
                        <p>❤️ Vidas restantes: ${vidas}</p>
                        <p>✔️ Correctas: ${correctas}</p>
                        <p>❌ Incorrectas: ${total - correctas}</p>
                        <p>📌 Progreso guardado en tu historial.</p>
                    `;

            document.getElementById("mainContainer").style.display = "none";
            document.getElementById("finalScreen").style.display = "block";
        }

        function goToTemas() {
            window.location.href = "temas.html";
        }

        updateHearts();
        cargarIds();
    </script>
</body>
</html>
